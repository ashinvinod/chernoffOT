services:
  chernoff:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Required: point this at your managed Prometheus / PromQL-compatible endpoint.
      # Examples:
      #   Amazon Managed Prometheus: https://aps-workspaces.<region>.amazonaws.com/workspaces/<id>
      #   Google Managed Prometheus:  https://monitoring.googleapis.com/v1/projects/<project>/location/global/prometheus
      #   Grafana Cloud:              https://prometheus-prod-XX.grafana.net/api/prom
      - PROMETHEUS_URL=${PROMETHEUS_URL:?PROMETHEUS_URL must be set to your Prometheus endpoint}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-15}
      # Optional auth — set PROMETHEUS_AUTH=bearer and PROMETHEUS_TOKEN=<token>, etc.
      # - PROMETHEUS_AUTH=bearer
      # - PROMETHEUS_TOKEN=
